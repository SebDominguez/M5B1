name: docker-publish

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md' # eviter de build et test quand je change une virgule dans un markdown
      - 'ressources/**' # pareil mais quand je fou un fichier dans resources
      - '.gitignore' # quand je touche au .gitignore

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest -v


  build-and-push:
    runs-on: ubuntu-latest
    environment: dev
    needs: pytest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lire APP_VERSION depuis .env
        run: |
          source .env
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/m5b1-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/m5b1-backend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/m5b1-backend:${{ env.APP_VERSION }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/m5b1-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/m5b1-frontend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/m5b1-frontend:${{ env.APP_VERSION }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache