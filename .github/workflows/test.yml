name: tests

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md' # eviter de build et test quand je change une virgule dans un markdown
      - 'ressources/**' # pareil mais quand je fou un fichier dans resources
      - '.gitignore' # quand je touche au .gitignore

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest -v
